//  RHYTHM CHECK — NURS 444 Critical Care
//  Cardiac dysrhythmia / EKG rhythm-strip study game (NOT music/BPM).
//  Self-study dysrhythmia game. Four rounds per strip:
//  ID the rhythm -> symptoms -> typical causes -> intervention.
//  All strips are drawn as accurate SVG waveforms (no copyrighted images).
//  ACLS dosing reflects 2020 AHA guidelines — verify against current AHA.
// ============================================================

// ---------- SVG strip generator ----------
// Coordinate system: 720 wide, 160 tall. Baseline y=90. Up = smaller y.

const B = 90; // baseline

// One PQRST beat starting at x, with knobs. Returns path segment string (no leading M).
function beat(x, { p = true, pAmp = 8, pInv = false, qrsW = 14, qrsAmp = 48, tAmp = 12, tInv = false, prGap = 16, wide = false, st = 0, sx = 1 } = {}) {
  let s = "";
  let cx = x;
  // P wave
  if (p) {
    const dir = pInv ? 1 : -1;
    s += `L${cx + 6 * sx} ${B} Q${cx + 12 * sx} ${B + dir * pAmp} ${cx + 18 * sx} ${B} `;
    cx += (18 + prGap) * sx;
  } else {
    cx += prGap * sx;
  }
  // QRS
  if (wide) {
    s += `L${cx} ${B} L${cx + 6 * sx} ${B + 10} L${cx + 14 * sx} ${B - qrsAmp} L${cx + 26 * sx} ${B + 18} L${cx + 34 * sx} ${B + st} `;
    cx += 40 * sx;
  } else {
    s += `L${cx} ${B} L${cx + 3 * sx} ${B + 12} L${cx + (qrsW / 2) * sx} ${B - qrsAmp} L${cx + (qrsW - 2) * sx} ${B + 16} L${cx + (qrsW + 2) * sx} ${B + st} `;
    cx += (qrsW + 6) * sx;
  }
  // ST segment + T wave
  const tdir = tInv ? 1 : -1;
  s += `L${cx + 8 * sx} ${B + st} Q${cx + 20 * sx} ${B + st + tdir * tAmp} ${cx + 32 * sx} ${B + st} `;
  cx += 40 * sx;
  s += `L${cx + 14 * sx} ${B} `;
  return { seg: s, end: cx + 14 * sx };
}

function makeRegular(opts, gap, count, startBeats = {}) {
  let d = `M0 ${B} `;
  let x = 30;
  for (let i = 0; i < count; i++) {
    const o = typeof opts === "function" ? opts(i) : opts;
    const r = beat(x, o);
    d += r.seg;
    x = r.end + gap;
  }
  d += `L720 ${B}`;
  return d;
}

// Flatline with subtle noise
function flat() {
  let d = `M0 ${B} `;
  for (let x = 0; x <= 720; x += 24) d += `L${x} ${B + (Math.sin(x) * 0.6)} `;
  return d;
}

// Chaotic VFib-style scribble
function chaos(amp) {
  let d = `M0 ${B} `;
  let x = 10;
  let seed = 7;
  while (x < 710) {
    seed = (seed * 9301 + 49297) % 233280;
    const r = (seed / 233280 - 0.5) * 2;
    x += 6 + Math.abs(r) * 8;
    d += `L${x.toFixed(1)} ${(B + r * amp).toFixed(1)} `;
  }
  d += `L720 ${B}`;
  return d;
}

// Sawtooth flutter baseline with periodic QRS
function flutter() {
  let d = `M0 ${B} `;
  let x = 10;
  let toggle = 0;
  while (x < 710) {
    // sawtooth
    d += `L${x + 8} ${B - 14} L${x + 16} ${B + 4} `;
    x += 16;
    toggle++;
    // 2:1 conduction → ventricular rate ~150 (the classic flutter finding)
    if (toggle % 2 === 0) {
      d += `L${x} ${B} L${x + 3} ${B + 10} L${x + 8} ${B - 40} L${x + 13} ${B + 12} L${x + 16} ${B} `;
      x += 16;
    }
  }
  d += `L720 ${B}`;
  return d;
}

// AFib: irregular narrow QRS, wavy baseline, no P
function afib() {
  let d = `M0 ${B} `;
  const gaps = [70, 110, 60, 95, 130, 75, 100];
  let x = 20;
  let gi = 0;
  while (x < 660) {
    // fibrillatory baseline
    for (let k = 0; k < 4; k++) d += `L${x - 16 + k * 4} ${B + (k % 2 ? -3 : 3)} `;
    d += `L${x} ${B} L${x + 3} ${B + 10} L${x + 7} ${B - 42} L${x + 11} ${B + 12} L${x + 15} ${B} `;
    x += gaps[gi % gaps.length];
    gi++;
  }
  d += `L720 ${B}`;
  return d;
}

// Torsades: spindle that grows and shrinks, twisting around baseline
function torsades() {
  let d = `M0 ${B} `;
  let x = 10;
  let i = 0;
  while (x < 710) {
    const env = 10 + 36 * Math.abs(Math.sin(i / 9));
    const dir = i % 2 ? -1 : 1;
    d += `L${x + 5} ${(B + dir * env).toFixed(1)} `;
    x += 11;
    i++;
  }
  d += `L720 ${B}`;
  return d;
}

// VTach: regular wide sine-ish
function vtach() {
  let d = `M0 ${B} `;
  let x = 10;
  let i = 0;
  while (x < 710) {
    const dir = i % 2 ? -1 : 1;
    d += `L${x + 7} ${B + dir * 40} `;
    x += 15;
    i++;
  }
  d += `L720 ${B}`;
  return d;
}

// Mobitz I: PR lengthens then a dropped QRS (P with no QRS)
function mobitzI() {
  let d = `M0 ${B} `;
  let x = 25;
  const prSeq = [10, 22, 36, null]; // null = dropped QRS
  let si = 0;
  while (x < 640) {
    const pr = prSeq[si % prSeq.length];
    // P wave
    d += `L${x + 6} ${B} Q${x + 12} ${B - 8} ${x + 18} ${B} `;
    if (pr === null) {
      x += 70; // dropped beat, longer pause
    } else {
      const qx = x + 18 + pr;
      d += `L${qx} ${B} L${qx + 3} ${B + 10} L${qx + 8} ${B - 44} L${qx + 13} ${B + 14} L${qx + 16} ${B} `;
      d += `Q${qx + 30} ${B - 11} ${qx + 44} ${B} `;
      x = qx + 60;
    }
    si++;
  }
  d += `L720 ${B}`;
  return d;
}

// Mobitz II: constant PR, occasional dropped QRS
function mobitzII() {
  let d = `M0 ${B} `;
  let x = 25;
  const pattern = [1, 1, 0, 1, 1, 1, 0]; // 0 = dropped
  let pi = 0;
  while (x < 650) {
    d += `L${x + 6} ${B} Q${x + 12} ${B - 8} ${x + 18} ${B} `;
    if (pattern[pi % pattern.length] === 0) {
      x += 64;
    } else {
      const qx = x + 34;
      d += `L${qx} ${B} L${qx + 3} ${B + 10} L${qx + 8} ${B - 44} L${qx + 13} ${B + 14} L${qx + 16} ${B} `;
      d += `Q${qx + 30} ${B - 11} ${qx + 44} ${B} `;
      x = qx + 56;
    }
    pi++;
  }
  d += `L720 ${B}`;
  return d;
}

// 3rd degree: P waves marching independent of QRS
function thirdDegree() {
  let d = `M0 ${B} `;
  // Independent P timeline and QRS timeline
  const pPositions = [];
  for (let x = 30; x < 700; x += 70) pPositions.push(x);
  const qrsPositions = [60, 230, 400, 570];
  // Build by sampling across x and adding bumps
  let x = 0;
  const step = 2;
  while (x <= 720) {
    let y = B;
    pPositions.forEach((px) => {
      const dx = x - px;
      if (Math.abs(dx) < 12) y += -7 * Math.cos((dx / 12) * (Math.PI / 2));
    });
    qrsPositions.forEach((qx) => {
      const dx = x - qx;
      if (dx > 0 && dx < 4) y += dx * 4;
      else if (dx >= 4 && dx < 9) y -= (dx - 4) * 11 - 16;
      else if (dx >= 9 && dx < 14) y += (dx - 9) * 9 - 39;
    });
    d += `L${x} ${y.toFixed(1)} `;
    x += step;
  }
  return d;
}

// PVC: normal beats then a wide bizarre early beat
function pvc() {
  let d = `M0 ${B} `;
  let x = 25;
  const seq = ["n", "n", "pvc", "n", "n", "n", "pvc"];
  let si = 0;
  while (x < 640) {
    if (seq[si % seq.length] === "pvc") {
      // wide bizarre, opposite deflection, no P
      d += `L${x} ${B} L${x + 6} ${B + 38} L${x + 20} ${B - 30} L${x + 34} ${B + 20} L${x + 44} ${B} `;
      x += 44 + 30; // compensatory pause
    } else {
      d += `L${x + 6} ${B} Q${x + 12} ${B - 8} ${x + 18} ${B} `;
      const qx = x + 32;
      d += `L${qx} ${B} L${qx + 3} ${B + 10} L${qx + 8} ${B - 44} L${qx + 13} ${B + 14} L${qx + 16} ${B} `;
      d += `Q${qx + 28} ${B - 11} ${qx + 40} ${B} `;
      x = qx + 52;
    }
    si++;
  }
  d += `L720 ${B}`;
  return d;
}

// PAC: normal beats then an early beat with abnormal P
function pac() {
  let d = `M0 ${B} `;
  let x = 25;
  const seq = ["n", "n", "pac", "n", "n", "n"];
  let si = 0;
  while (x < 650) {
    const early = seq[si % seq.length] === "pac";
    const pAmp = early ? 12 : 8;
    const pInvShift = early ? 4 : 0; // slightly odd shape
    d += `L${x + 6} ${B} Q${x + 12} ${B - pAmp} ${x + 18 + pInvShift} ${B} `;
    const qx = x + 32;
    d += `L${qx} ${B} L${qx + 3} ${B + 10} L${qx + 8} ${B - 44} L${qx + 13} ${B + 14} L${qx + 16} ${B} `;
    d += `Q${qx + 28} ${B - 11} ${qx + 40} ${B} `;
    x = qx + (early ? 40 : 56); // early beat shortens cycle
    si++;
  }
  d += `L720 ${B}`;
  return d;
}

// PEA — show an organized-looking normal rhythm (the trap)
function pea() {
  return makeRegular({ p: true, pAmp: 8, qrsAmp: 44, tAmp: 11 }, 30, 7);
}

// ---------- Build named strip paths ----------
// STEMI: elevated ST segment that lifts off the baseline after the QRS,
// merging into a broad T wave (tombstone-ish). Drawn for pattern recognition.
function stemi() {
  let d = `M0 ${B} `;
  let x = 25;
  const gap = 96;
  for (let i = 0; i < 6; i++) {
    // small P
    d += `L${x + 6} ${B} Q${x + 12} ${B - 7} ${x + 18} ${B} `;
    const qx = x + 30;
    // QRS
    d += `L${qx} ${B} L${qx + 3} ${B + 10} L${qx + 8} ${B - 46} L${qx + 13} ${B + 8} `;
    // J point lifts UP into an elevated, coved ST segment, then broad T
    const j = qx + 16;
    d += `L${j} ${B - 18} `;                       // ST elevated, sits high
    d += `Q${j + 22} ${B - 30} ${j + 44} ${B - 16} `; // coved/domed ST-T
    d += `Q${j + 56} ${B - 4} ${j + 64} ${B} `;    // return toward baseline
    x = qx + 16 + 64 + gap - 30;
  }
  d += `L720 ${B}`;
  return d;
}

// shuffle helper (stable per case+round via seed)
function shuffle(arr, seed) {
  const a = [...arr];
  let s = seed;
  for (let i = a.length - 1; i > 0; i--) {
    s = (s * 9301 + 49297) % 233280;
    const j = Math.floor((s / 233280) * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ---------- strip ----------
// Sanitize a path string: drop any command group containing NaN/undefined/Infinity,
// since a single bad number silently voids the ENTIRE <path>.
function safePath(d) {
  if (typeof d !== "string") return "M0 90 L720 90";
  // split into commands, keep only ones with all-finite numbers
  const tokens = d.match(/[MLQ][^MLQ]*/g);
  if (!tokens) return "M0 90 L720 90";
  const clean = tokens.filter((t) => {
    const nums = t.slice(1).trim().split(/[\s,]+/).filter(Boolean);
    return nums.every((n) => Number.isFinite(parseFloat(n)));
  });
  const out = clean.join(" ").trim();
  return out.startsWith("M") ? out : "M0 90 " + out;
}

function Strip({ draw }) {
  return (
    <svg viewBox="0 0 720 160" className="strip" preserveAspectRatio="none" aria-hidden="true">
      <defs>
        <pattern id="sm" width="8" height="8" patternUnits="userSpaceOnUse">
          <path d="M8 0H0V8" fill="none" stroke="rgba(74,222,128,0.10)" strokeWidth="0.5" />
        </pattern>
        <pattern id="lg" width="40" height="40" patternUnits="userSpaceOnUse">
          <path d="M40 0H0V40" fill="none" stroke="rgba(74,222,128,0.22)" strokeWidth="1" />
        </pattern>
      </defs>
      <rect x="0" y="0" width="720" height="160" fill="url(#sm)" />
      <rect x="0" y="0" width="720" height="160" fill="url(#lg)" />
      <path d={safePath(draw)} fill="none" stroke="#4ade80" strokeWidth="2.1" strokeLinejoin="round" strokeLinecap="round" />
    </svg>
  );
}

// ============================================================
//  ENGINE — drives every mode
// ============================================================
function Engine({mode, reviewPick, onExit, onRestart}){
  const cfg = MODES.find(m=>m.id===mode);
  const isCases = mode === "cases";
  const isReview = mode === "review";

  // queue of case indices
  const [queue] = useState(()=>{
    if (isReview) return [reviewPick];
    if (isCases) return shuffle(CASE_STUDIES.map((_,i)=>i), (Math.random()*1e9)|0);
    // Random seed so the order (and the opening rhythm) changes on every run —
    // including "run it back", which remounts the Engine via its key.
    return shuffle(CASES.map((_,i)=>i), (Math.random()*1e9)|0);
  });
  // which rounds are active this mode
  const activeRounds = cfg.rounds || [3];

  const [qi, setQi] = useState(0);      // index into queue
  const [ri, setRi] = useState(0);      // index into activeRounds
  const [picked, setPicked] = useState(null);
  const [locked, setLocked] = useState(false);
  const [score, setScore] = useState(0);
  const [answered, setAnswered] = useState(0);
  const [streak, setStreak] = useState(0);
  const [bestStreak, setBestStreak] = useState(0);
  const [missed, setMissed] = useState([]);
  const [roundResults, setRoundResults] = useState({});
  const [done, setDone] = useState(false);

  const totalQ = (isCases ? CASE_STUDIES.length : queue.length) * activeRounds.length;

  // ----- CASE STUDY rendering -----
  if (isCases){
    const cs = CASE_STUDIES[queue[qi]];
    const choices = useMemo(()=>shuffle(cs.choices, qi*13+3), [qi]);
    const right = picked === cs.correct;
    const reaction = right ? rng(HIT, answered*7+qi) : rng(MISS, answered*5+qi);
    const streakMsg = right && STREAK[streak] ? STREAK[streak] : null;
    const last = qi === CASE_STUDIES.length-1;

    function pick(ch){
      if(locked) return;
      setPicked(ch); setLocked(true); setAnswered(a=>a+1);
      if(ch===cs.correct){ setScore(s=>s+1); setStreak(st=>{const n=st+1; setBestStreak(b=>Math.max(b,n)); return n;}); }
      else { setStreak(0); setMissed(m=>[...m,{rhythm:cs.scenario.slice(0,42)+"…", round:"the call", right:cs.correct}]); }
    }
    function next(){ setPicked(null); setLocked(false); if(last) setDone(true); else setQi(q=>q+1); }

    if(done) return <Results mode={mode} score={score} totalQ={totalQ} bestStreak={bestStreak} missed={missed} onExit={onExit} onRestart={onRestart} />;

    return (
      <>
        <TopBar title="Case Studies 🎬" onExit={onExit} score={score} answered={answered} streak={streak} />
        <main className="rc-card">
          <Progress label={`case ${qi+1} / ${CASE_STUDIES.length}`} pct={(qi/CASE_STUDIES.length)*100} />
          <Strip draw={STRIPS[cs.strip]} />
          <div className="rc-vibe">{cs.vibe}</div>
          <p className="rc-scenario">{cs.scenario}</p>
          <h2 className="rc-prompt">{cs.q}</h2>
          <Choices choices={choices} locked={locked} picked={picked} correct={cs.correct} onPick={pick} />
          {locked && (
            <Feedback right={right} reaction={reaction} streakMsg={streakMsg} correct={cs.correct} seed={qi}
              pearl={cs.why} last={last} onNext={next} lastLabel="see the damage →" />
          )}
        </main>
      </>
    );
  }

  // ----- STANDARD modes (full / id / causes / intv / review) -----
  const c = CASES[queue[qi]];
  const roundIdx = activeRounds[ri];
  const r = ROUNDS[roundIdx];
  const correctText = roundIdx===0 ? c.rhythm : c[r.key].correct;
  const rawChoices = roundIdx===0 ? c.rhythmChoices : c[r.key].choices;
  const choices = useMemo(()=>shuffle(rawChoices, qi*17+roundIdx*31+5), [qi, ri]);
  const right = picked === correctText;
  const reaction = right ? rng(HIT, answered*7+qi) : rng(MISS, answered*5+qi);
  const streakMsg = right && STREAK[streak] ? STREAK[streak] : null;
  const last = qi === queue.length-1 && ri === activeRounds.length-1;
  const showPearl = roundIdx === 3 || (activeRounds.length===1); // pearl after intervention, or always in single-round drills

  function pick(ch){
    if(locked) return;
    const isRight = ch===correctText;
    setPicked(ch); setLocked(true); setAnswered(a=>a+1);
    setRoundResults(rr=>({...rr,[roundIdx]:isRight}));
    if(isRight){ setScore(s=>s+1); setStreak(st=>{const n=st+1; setBestStreak(b=>Math.max(b,n)); return n;}); }
    else { setStreak(0); setMissed(m=>[...m,{rhythm:c.rhythm, round:r.label, right:correctText}]); }
  }
  function next(){
    setPicked(null); setLocked(false);
    if(ri < activeRounds.length-1){ setRi(x=>x+1); }
    else if(qi < queue.length-1){ setQi(x=>x+1); setRi(0); setRoundResults({}); }
    else setDone(true);
  }

  if(done) return <Results mode={mode} score={score} totalQ={totalQ} bestStreak={bestStreak} missed={missed} onExit={onExit} onRestart={onRestart} />;

  return (
    <>
      <TopBar title={cfg.title+" "+cfg.emoji} onExit={onExit} score={score} answered={answered} streak={streak} />
      <main className="rc-card">
        <Progress
          label={isReview ? c.rhythm : `${roundIdx===0?"":""}${qi+1} / ${queue.length}`}
          pct={((qi*activeRounds.length+ri)/totalQ)*100} />
        <Strip draw={STRIPS[c.strip]} />

        {/* round tracker only when multiple rounds run per case */}
        {activeRounds.length>1 && (
          <div className="rc-rounds">
            {activeRounds.map((rIdx,i)=>{
              let cls="rc-rtab";
              if(i===ri && !locked) cls+=" active";
              else if(i===ri && locked) cls+=(right?" active done-good":" active done-bad");
              else if(roundResults[rIdx]===true) cls+=" done-good";
              else if(roundResults[rIdx]===false) cls+=" done-bad";
              return <div key={rIdx} className={cls}><span className="rc-rnum">{i+1}</span>{ROUNDS[rIdx].label}</div>;
            })}
          </div>
        )}

        <h2 className="rc-prompt">{r.prompt}</h2>
        <Choices choices={choices} locked={locked} picked={picked} correct={correctText} onPick={pick} />
        {locked && (
          <Feedback right={right} reaction={reaction} streakMsg={streakMsg} correct={correctText} seed={qi}
            pearl={showPearl ? c.pearl : null} last={last} onNext={next}
            lastLabel={isReview ? "done — back to list →" : "see how cooked you are →"} />
        )}
      </main>
    </>
  );
}

// ---------- shared bits ----------
function TopBar({title, onExit, score, answered, streak}){
  return (
    <header className="rc-head">
      <div className="rc-brand">
        <button className="rc-back small" onClick={onExit}>←</button>
        <div><h1>{title}</h1><p>NURS 444 · crit care</p></div>
      </div>
      <Score score={score} answered={answered} streak={streak} />
    </header>
  );
}
function Progress({label, pct}){
  return (
    <div className="rc-progress">
      <span>{label}</span>
      <div className="rc-bar"><div className="rc-fill" style={{width:`${pct}%`}}/></div>
    </div>
  );
}
function Choices({choices, locked, picked, correct, onPick}){
  return (
    <div className="rc-choices">
      {choices.map(ch=>{
        let cls="rc-choice";
        if(locked){ if(ch===correct) cls+=" correct"; else if(ch===picked) cls+=" wrong"; else cls+=" dim"; }
        return <button key={ch} className={cls} onClick={()=>onPick(ch)} disabled={locked}>{ch}</button>;
      })}
    </div>
  );
}
function Feedback({right, reaction, streakMsg, correct, pearl, last, onNext, lastLabel, seed=0}){
  const profLeft = (seed % 2) === 0; // left of text -> point right (mirrored)
  return (
    <div className={`rc-feedback ${right?"good":"bad"}`}>
      <div className="rc-reactline">
        <strong>{reaction}</strong>
        {streakMsg && <span className="rc-streakmsg">{streakMsg}</span>}
      </div>
      {!right && <span className="rc-fix">✓ it's <b>{correct}</b></span>}
      {pearl && (
        <div className="rc-pearlwrap">
          {profLeft && <img className="rc-prof-sm flip" src={PROF_T} alt="Professor T" />}
          <span className="rc-pearl"><b>Professor T:</b> {pearl}</span>
          {!profLeft && <img className="rc-prof-sm" src={PROF_T} alt="Professor T" />}
        </div>
      )}
      <button className="rc-next" onClick={onNext}>{last ? lastLabel : "next →"}</button>
    </div>
  );
}
function Results({mode, score, totalQ, bestStreak, missed, onExit, onRestart}){
  const pct = Math.round((score/totalQ)*100);
  const head = pct>=90?"ok diagnostic menace 🫡":pct>=75?"locked in, mostly 👀":pct>=50?"we have work to do bestie":"respectfully go reread the deck 💀";
  return (
    <main className="rc-card rc-results">
      <button className="rc-back" onClick={onExit}>← modes</button>
      <h2>{head}</h2>
      <div className="rc-finalscore">{score}<span>/{totalQ}</span></div>
      <p className="rc-finalpct">{pct}% · longest streak {bestStreak} {bestStreak>=7?"⚡":""}</p>
      {missed.length>0 ? (
        <>
          <h3>the ones that got you</h3>
          <ul className="rc-misslist">
            {missed.map((m,i)=>(
              <li key={i}>
                <span className="rc-missrhythm">{m.rhythm}</span>
                <span className="rc-missround">{m.round}</span>
                <span className="rc-missright">✓ {m.right}</span>
              </li>
            ))}
          </ul>
        </>
      ) : <p className="rc-clean">clean sweep. zero misses. the crash cart fears you ⚡</p>}
      <div className="rc-resbtns">
        <button className="rc-next ghost" onClick={onExit}>back to modes</button>
        <button className="rc-next" onClick={onRestart}>run it back</button>
      </div>
    </main>
  );
}

.rc-next.ghost{background:rgba(255,255,255,.04);border:1px solid rgba(168,85,247,.35);color:#c4b5e8;box-shadow:none;}
.rc-next.ghost:hover{border-color:#22d3ee;color:#22d3ee;}
.rc-results{text-align:center;}
.rc-results h2{font-size:24px;margin:6px 0 0;color:#f5f2ff;font-weight:900;}
.rc-finalscore{font-size:56px;font-weight:900;line-height:1.1;margin-top:8px;
  background:linear-gradient(95deg,#a3ff5e,#22d3ee,#a855f7);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.rc-finalscore span{font-size:26px;-webkit-text-fill-color:#7a6ba3;}
.rc-finalpct{color:#9c8fc4;font-size:13px;margin:2px 0 22px;}
.rc-results h3{font-size:13px;text-transform:uppercase;letter-spacing:1px;color:#9c8fc4;text-align:left;margin:0 0 10px;}
.rc-misslist{list-style:none;padding:0;margin:0 0 22px;text-align:left;display:flex;flex-direction:column;gap:8px;}
.rc-misslist li{background:rgba(255,255,255,.035);border:1px solid rgba(236,72,153,.28);border-radius:10px;padding:10px 12px;display:flex;flex-direction:column;gap:3px;}
.rc-missrhythm{font-weight:700;font-size:14px;color:#f5f2ff;}
.rc-missround{font-size:11px;color:#9c8fc4;text-transform:uppercase;letter-spacing:.5px;}
.rc-missright{font-size:12.5px;color:#bdf09a;margin-top:2px;}
.rc-clean{color:#bdf09a;font-size:15px;margin-bottom:22px;}
.rc-resbtns{display:flex;gap:10px;justify-content:center;}
/* cover */
.rc-cover{background:linear-gradient(165deg,rgba(34,24,58,.92),rgba(18,14,36,.94));border:1px solid rgba(168,85,247,.3);border-radius:20px;padding:0 24px 24px;box-shadow:0 24px 70px -28px rgba(0,0,0,.75);overflow:hidden;}
.rc-cover-hero{display:flex;flex-direction:column;align-items:center;text-align:center;padding-top:8px;position:relative;}
.rc-cover-hero::after{content:"";position:absolute;top:40px;left:50%;transform:translateX(-50%);width:340px;height:340px;border-radius:50%;background:radial-gradient(circle,rgba(34,211,238,.22),rgba(168,85,247,.12) 45%,transparent 70%);z-index:0;pointer-events:none;}
.rc-cover-prof{width:260px;height:auto;position:relative;z-index:1;filter:drop-shadow(0 12px 28px rgba(34,211,238,.4));margin-bottom:-4px;}
.rc-cover-kicker{position:relative;z-index:1;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#22d3ee;}
.rc-cover-title{position:relative;z-index:1;font-size:46px;font-weight:900;letter-spacing:-1.8px;margin:2px 0 4px;line-height:1;background:linear-gradient(95deg,#a3ff5e 0%,#4ade80 30%,#22d3ee 70%,#a855f7 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.rc-cover-by{position:relative;z-index:1;font-size:13px;color:#b3a8d4;margin:0 0 18px;font-weight:600;}
.rc-cover-body{max-width:560px;margin:0 auto;}
.rc-cover-lede{font-size:15px;line-height:1.6;color:#e8e2f6;margin:0 0 16px;text-align:center;}
.rc-cover-list{list-style:none;padding:0;margin:0 0 16px;display:flex;flex-direction:column;gap:9px;}
.rc-cover-list li{font-size:13.5px;line-height:1.5;color:#cfc6ea;background:rgba(255,255,255,.035);border:1px solid rgba(168,85,247,.22);border-radius:11px;padding:11px 13px;}
.rc-cover-list b{color:#a3ff5e;}
.rc-cover-disc{background:rgba(250,204,21,.10);border:1px solid rgba(250,204,21,.32);color:#f0d97a;font-size:11.5px;line-height:1.55;padding:10px 13px;border-radius:10px;margin-bottom:18px;}
.rc-cover-btn{width:100%;background:linear-gradient(95deg,#a3ff5e,#22d3ee);color:#0a0f1f;border:none;font-weight:800;font-size:16px;padding:15px;border-radius:12px;cursor:pointer;transition:all .15s;box-shadow:0 8px 24px -8px rgba(34,211,238,.6);}
.rc-cover-btn:hover{filter:brightness(1.08);transform:translateY(-2px);}
/* educational review */
.rc-review{position:relative;}
.rc-tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:14px 0 0;}
.rc-tab{font-size:11px;font-weight:700;color:#b3a8d4;background:rgba(255,255,255,.03);border:1px solid rgba(168,85,247,.25);border-radius:10px;padding:9px 4px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:all .15s;line-height:1.1;text-align:center;}
.rc-tab:hover{border-color:#22d3ee;color:#e4ddf5;}
.rc-tab.on{color:#0a0f1f;background:linear-gradient(95deg,#a3ff5e,#22d3ee);border-color:transparent;}
.rc-tab-emoji{font-size:17px;}
.rc-teach{display:flex;align-items:center;gap:0;margin-top:14px;min-height:190px;}
.rc-teach-body{flex:1;background:rgba(255,255,255,.035);border:1px solid rgba(168,85,247,.28);border-radius:14px;padding:15px 16px;align-self:stretch;display:flex;flex-direction:column;justify-content:center;position:relative;z-index:1;}
.rc-teach-label{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:#a3ff5e;margin-bottom:8px;}
.rc-teach-text{font-size:14.5px;line-height:1.65;color:#e8e2f6;margin:0;}
.rc-prof{width:158px;height:auto;flex-shrink:0;align-self:center;filter:drop-shadow(0 6px 18px rgba(34,211,238,.3));margin-left:-22px;margin-top:46px;position:relative;z-index:2;}
.rc-prof.flip{transform:scaleX(-1);margin-left:0;margin-right:-22px;}
.rc-protake{margin-top:14px;background:linear-gradient(150deg,rgba(168,85,247,.16),rgba(34,211,238,.10));border:1px solid rgba(168,85,247,.35);border-radius:14px;padding:13px 15px;}
.rc-protake-tag{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.4px;color:#22d3ee;margin-bottom:6px;}
.rc-protake p{margin:0;font-size:13.5px;line-height:1.6;color:#e4ddf5;}
.rc-review-nav{display:flex;justify-content:space-between;gap:10px;margin-top:16px;}
.rc-review-nav .rc-next{align-self:auto;}
/* avatar in quiz reveal */
.rc-pearlwrap{display:flex;gap:11px;align-items:flex-start;border-top:1px solid rgba(255,255,255,.08);padding-top:11px;}
.rc-prof-sm{width:62px;height:auto;flex-shrink:0;align-self:center;filter:drop-shadow(0 4px 10px rgba(34,211,238,.3));}
.rc-prof-sm.flip{transform:scaleX(-1);}
.rc-pearlwrap .rc-pearl{border:none;padding:0;}
.rc-pearl b{color:#22d3ee;}
@media(max-width:480px){.rc-modes{grid-template-columns:1fr}.rc-picklist{grid-template-columns:1fr}.rc-hero h1{font-size:33px}.strip{height:122px}.rc-prompt{font-size:16px}.rc-rtab{font-size:9px}.rc-prof{width:120px !important}.rc-teach{min-height:150px !important}.rc-cover{padding:0 16px 18px}.rc-cover-prof{width:210px}.rc-cover-hero::after{width:250px;height:250px;top:24px}.rc-cover-title{font-size:36px}.rc-cover-lede{font-size:14px}}
`;


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<RhythmCheck />);
    </script>
  </body>
